<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

// ============================================================
// MOCK DATA
// ============================================================
// Comenzile reflectă exact cele 11 magazine din page-magazine.html
// prioritate = prioritate_livrare din magazine (scala 1-4)
const INITIAL_ORDERS = [
  { id:1,  cod:"000832", magazin:"C PLOIESTI (BILLA VEST)",  localitate:"Ploiești",           paleti:8,  d60:8,  rolls:0, kg:2890, prioritate:3 },
  { id:2,  cod:"000083", magazin:"S PLOIEȘTI 2",              localitate:"Ploiești",           paleti:13, d60:10, rolls:3, kg:4356, prioritate:3 },
  { id:3,  cod:"000097", magazin:"S PLOIEȘTI 3",              localitate:"Ploiești",           paleti:10, d60:10, rolls:0, kg:3500, prioritate:3 },
  { id:4,  cod:"000128", magazin:"S PLOIEȘTI 4",              localitate:"Ploiești",           paleti:9,  d60:9,  rolls:0, kg:3200, prioritate:3 },
  { id:5,  cod:"000161", magazin:"S PLOIEȘTI 6",              localitate:"Ploiești",           paleti:11, d60:9,  rolls:2, kg:3800, prioritate:3 },
  { id:6,  cod:"000374", magazin:"EXPRESS PLOIEȘTI DOJA",     localitate:"Ploiești",           paleti:4,  d60:4,  rolls:0, kg:1400, prioritate:3 },
  { id:7,  cod:"000886", magazin:"IC SINAIA",                 localitate:"Sinaia",             paleti:6,  d60:6,  rolls:2, kg:2100, prioritate:1 },
  { id:8,  cod:"000202", magazin:"S BAICOI",                  localitate:"Băicoi",             paleti:7,  d60:7,  rolls:0, kg:2450, prioritate:2 },
  { id:9,  cod:"000230", magazin:"S VALEA CALUGAREASCA",      localitate:"Valea Călugăreasca", paleti:5,  d60:5,  rolls:0, kg:1750, prioritate:2 },
  { id:10, cod:"000214", magazin:"S BOLDEȘTI SCĂIENI",        localitate:"Boldești-Scăeni",    paleti:6,  d60:6,  rolls:0, kg:2100, prioritate:2 },
  { id:11, cod:"000060", magazin:"CAMPINA SUPER",             localitate:"Câmpina",            paleti:10, d60:10, rolls:0, kg:3500, prioritate:4 },

// Flota completă (doar disponibile, fără service)
const FLEET = [
  { id:1, numar:"PH26RVM", denumire:"Camion Mic 1",   mma:5000,  capacitate_ep:8,  capacitate_d60:16, capacitate_rolls:12, util_kg:3000,  prioritate:1 },
  { id:3, numar:"PH58RVM", denumire:"Camion Mediu 1", mma:5000,  capacitate_ep:10, capacitate_d60:20, capacitate_rolls:15, util_kg:3000,  prioritate:3 },
  { id:4, numar:"PH73RVM", denumire:"Camion Mediu 2", mma:7200,  capacitate_ep:10, capacitate_d60:20, capacitate_rolls:15, util_kg:4000,  prioritate:4 },
  { id:5, numar:"B791RVM", denumire:"Camion Mare 1",  mma:7200,  capacitate_ep:12, capacitate_d60:24, capacitate_rolls:18, util_kg:4200,  prioritate:5 },
  { id:6, numar:"PH93RVM", denumire:"Camion Mare 2",  mma:7500,  capacitate_ep:13, capacitate_d60:26, capacitate_rolls:19, util_kg:4200,  prioritate:6 },
  { id:7, numar:"PH15COX", denumire:"TIR 1",          mma:20000, capacitate_ep:20, capacitate_d60:40, capacitate_rolls:30, util_kg:10000, prioritate:7 },
];

// Detectăm ziua săptămânii (marți=2, vineri=5 → 5 șoferi)
const TODAY_DOW = new Date().getDay(); // 0=dum, 1=lun, 2=mar, 3=mie, 4=joi, 5=vin, 6=sâm
const IS_EXTRA_DAY = TODAY_DOW === 2 || TODAY_DOW === 5; // mar sau vin
const DEFAULT_DRIVERS = IS_EXTRA_DAY ? 5 : 4;

const NAV_ITEMS = [
  { label:"Planificare", icon:"📋", href:"page-planificare.html",  active:true },
  { label:"Comenzi",     icon:"📦", href:"page-comenzi.html"    },
  { label:"Rute",        icon:"🗺️", href:"page-rute.html"       },
  { label:"Auto",        icon:"🚚", href:"page-autovehicule.html"},
  { label:"Magazine",    icon:"🏪", href:"page-magazine.html"   },
  { label:"Utilizatori", icon:"👥", href:"page-utilizatori.html"},
  { label:"Huburi",      icon:"🏭", href:"page-huburi.html"     },
];

// Scala 1-5 identică cu prioritate_livrare din page-magazine.html
// 1=Urgent (cel mai important) → 5=Foarte mic (cel mai puțin important)
const PRIO_CONFIG = {
  1: { label:"URGENT",     bg:"bg-red-100",    text:"text-red-700",    border:"border-red-200",    dot:"bg-red-400"    },
  2: { label:"MARE",       bg:"bg-orange-100", text:"text-orange-700", border:"border-orange-200", dot:"bg-orange-400" },
  3: { label:"MEDIU",      bg:"bg-blue-100",   text:"text-blue-700",   border:"border-blue-200",   dot:"bg-blue-400"   },
  4: { label:"MIC",        bg:"bg-gray-100",   text:"text-gray-500",   border:"border-gray-200",   dot:"bg-gray-300"   },
  5: { label:"F. MIC",     bg:"bg-slate-50",   text:"text-slate-400",  border:"border-slate-200",  dot:"bg-slate-200"  },
};

const DOW_LABELS = ["Duminică","Luni","Marți","Miercuri","Joi","Vineri","Sâmbătă"];

// ============================================================
// DAY SETUP CARD
// ============================================================
function DaySetup({ nrSoferi, onNrSoferi, oraStart, onOraStart, onGenerate, generating }) {
  const zi = DOW_LABELS[TODAY_DOW];
  const isExtra = IS_EXTRA_DAY;

  return (
    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6">
      <div className="flex items-start justify-between gap-6 flex-wrap">

        {/* Titlu + zi */}
        <div>
          <p className="text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest mb-1">Configurare zi</p>
          <div className="flex items-center gap-2">
            <h2 className="text-lg font-extrabold text-gray-900">{zi}</h2>
            {isExtra && (
              <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">
                +1 ȘOFER (PH15COX)
              </span>
            )}
          </div>
          <p className="text-xs text-gray-400 mt-0.5">
            Program 06:00 – ~14:00 · încărcare 30 min · descărcare 30 min/magazin
          </p>
        </div>

        {/* Controale */}
        <div className="flex items-center gap-6 flex-wrap">

          {/* Ora start */}
          <div className="flex flex-col gap-1.5">
            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Ora start</label>
            <input type="time" value={oraStart} onChange={e => onOraStart(e.target.value)}
              className="border border-gray-200 bg-gray-50 rounded-xl px-3 py-2 text-sm font-bold text-gray-800
                         focus:outline-none focus:ring-2 focus:ring-indigo-400 w-32" />
          </div>

          {/* Nr. șoferi */}
          <div className="flex flex-col gap-1.5">
            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nr. șoferi activi</label>
            <div className="flex items-center gap-2">
              <button onClick={() => onNrSoferi(Math.max(1, nrSoferi - 1))}
                className="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-extrabold text-lg flex items-center justify-center transition-colors">−</button>
              <div className="w-12 text-center">
                <span className="text-2xl font-extrabold text-indigo-600">{nrSoferi}</span>
              </div>
              <button onClick={() => onNrSoferi(Math.min(7, nrSoferi + 1))}
                className="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-extrabold text-lg flex items-center justify-center transition-colors">+</button>
            </div>
          </div>

          {/* Vehicule auto-selectate preview */}
          <div className="flex flex-col gap-1.5">
            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Vehicule selectate automat</label>
            <div className="flex gap-1.5 flex-wrap">
              {FLEET.slice(0, nrSoferi).map(v => (
                <span key={v.id} className={`text-[10px] font-extrabold px-2.5 py-1 rounded-lg border tracking-widest
                  ${v.numar === "PH15COX" ? "bg-amber-100 text-amber-700 border-amber-200" : "bg-teal-50 text-teal-700 border-teal-200"}`}>
                  {v.numar}
                </span>
              ))}
            </div>
          </div>

          {/* CTA */}
          <button
            onClick={onGenerate}
            disabled={generating}
            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-extrabold text-sm transition-all shadow-md
              ${generating
                ? "bg-indigo-200 text-indigo-400 cursor-not-allowed"
                : "bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg active:scale-95"}`}>
            {generating
              ? <><span className="animate-spin text-base">⏳</span> Generez rute...</>
              : <><span className="text-base">🚀</span> Generează rute</>}

      </div>

}

// ============================================================
// TOPBAR
// ============================================================
function Topbar() {
  return (
    <header className="h-14 flex items-center justify-between px-6 flex-shrink-0 border-b border-blue-900" style={{background:'linear-gradient(135deg, #1E88E5 0%, #1565C0 60%, #0D47A1 100%)'}}>
      <div className="flex items-center gap-4">
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center text-white font-extrabold text-sm select-none shadow-lg">R</div>
          <span className="text-white font-bold text-sm tracking-wide">RVM LOGISTICS</span>

      <div className="flex items-center gap-3">
        <div className="flex items-center gap-1.5">

          <span className="text-blue-200 text-xs">admin</span>
        </div>
        <button className="text-xs px-3 py-1.5 rounded-lg bg-red-900/60 text-red-400 hover:bg-red-800 transition-colors font-semibold border border-red-900">Logout</button>

}

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar() {
  return (
    <aside className="w-56 border-r border-blue-900 flex flex-col py-4 gap-1 flex-shrink-0" style={{background:'linear-gradient(180deg, #1E88E5 0%, #1565C0 50%, #0D47A1 100%)'}}>
      {NAV_ITEMS.map(item => (
        <a key={item.label}
          href={item.href||'#'}
          style={{textDecoration:'none'}}
          className={`w-full flex items-center gap-4 py-4 px-6 text-left transition-all relative
            ${item.active ? "text-white bg-white/20" : "text-blue-100 hover:text-white hover:bg-white/10"}`}>

// ============================================================
// STATS CARD
// ============================================================
function StatsCard({ label, value, color }) {
  const s = {
    teal:   "bg-teal-50 border-teal-200 text-teal-600",
    blue:   "bg-blue-50 border-blue-200 text-blue-600",
    red:    "bg-red-50 border-red-200 text-red-600",
    green:  "bg-emerald-50 border-emerald-200 text-emerald-600",
    yellow: "bg-yellow-50 border-yellow-200 text-yellow-600",
  }[color] || "bg-gray-50 border-gray-200 text-gray-600";
  return (
    <div className={`flex flex-col items-center px-6 py-4 rounded-xl border-2 min-w-[110px] ${s}`}>
      <span className="text-3xl font-extrabold leading-none">{value}</span>
      <span className="text-xs font-semibold mt-1.5 text-center leading-tight opacity-80">{label}</span>
    </div>
  );
}

// ============================================================
// PRIORITY BADGE
// ============================================================
function PriorityBadge({ priority }) {
  const c = PRIO_CONFIG[priority] || PRIO_CONFIG[1];
  return (
    <span className={`text-[9px] font-extrabold px-2 py-1 rounded-md border tracking-widest ${c.bg} ${c.text} ${c.border}`}>
      {c.label}
    </span>
  );
}

// ============================================================
// CAPACITY BAR
// ============================================================
function CapacityBar({ label, used, total }) {
  const pct = total > 0 ? Math.min(100, Math.round((used / total) * 100)) : 0;
  const barColor = pct > 90 ? "bg-red-500" : pct > 70 ? "bg-amber-400" : "bg-teal-500";
  return (
    <div>
      <div className="flex justify-between text-[10px] text-gray-400 font-semibold mb-1">
        <span>{label}</span>
        <span className="font-bold text-gray-600">{used} / {total}</span>
      </div>
      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div className={`h-full ${barColor} rounded-full transition-all duration-300`} style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

// ============================================================
// SAVE MODAL
// ============================================================
function SaveModal({ assignedCount, totalCount, onConfirm, onCancel }) {
  return (
    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
      <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 border border-gray-100">
        <div className="text-center">
          <div className="w-14 h-14 rounded-2xl bg-teal-50 border border-teal-100 flex items-center justify-center text-2xl mx-auto mb-4">📋</div>
          <h3 className="text-lg font-extrabold text-gray-900 mb-2">Salvezi planificarea?</h3>
          <p className="text-sm text-gray-500 mb-1">
            <span className="font-bold text-teal-600">{assignedCount}</span> din <span className="font-bold text-gray-800">{totalCount}</span> comenzi asignate.
          </p>
          {assignedCount < totalCount && (
            <p className="text-xs text-amber-600 font-semibold mt-2">
              ⚠️ {totalCount - assignedCount} comenzi rămân neasignate.
            </p>
          )}
        </div>
        <div className="flex gap-3 mt-6">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Anulează</button>
          <button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl bg-teal-600 text-white text-sm font-bold hover:bg-teal-700 transition-colors">Salvează</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// VEHICLE LOAD CARD
// ============================================================
function VehicleLoadCard({ vehicle, vOrders, onRemove }) {
  const d60  = vOrders.reduce((s, o) => s + o.d60, 0);
  const kg   = vOrders.reduce((s, o) => s + o.kg,  0);
  const pct  = vehicle.capacitate_d60 > 0 ? Math.min(100, Math.round((d60 / vehicle.capacitate_d60) * 100)) : 0;

  return (
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      {/* Header */}
      <div className="px-4 py-3 bg-gray-50/70 border-b border-gray-100 flex items-center justify-between">
        <div>
          <p className="font-extrabold text-gray-900 tracking-widest text-sm">{vehicle.numar}</p>
          <p className="text-xs text-gray-400">{vehicle.denumire}</p>
        </div>
        <span className={`text-xs font-bold px-2.5 py-1 rounded-lg border
          ${vOrders.length > 0 ? "bg-teal-100 text-teal-700 border-teal-200" : "bg-gray-100 text-gray-400 border-gray-200"}`}>
          {vOrders.length} cmd
        </span>
      </div>

      {/* Capacity bars */}
      <div className="px-4 py-3 border-b border-gray-50 grid grid-cols-2 gap-3">
        <CapacityBar label="D60" used={d60} total={vehicle.capacitate_d60} />
        <CapacityBar label="KG" used={kg.toLocaleString("ro-RO")} total={vehicle.util_kg.toLocaleString("ro-RO")} />
      </div>

      {/* Assigned orders */}
      {vOrders.length === 0 ? (
        <div className="px-4 py-5 text-center text-xs text-gray-300 font-semibold select-none">Nicio comandă asignată</div>
      ) : (
        <div className="divide-y divide-gray-50 max-h-48 overflow-y-auto">
          {vOrders.map(o => (
            <div key={o.id} className="flex items-center gap-2 px-4 py-2.5 hover:bg-gray-50/50">
              <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${(PRIO_CONFIG[o.prioritate] || PRIO_CONFIG[3]).dot}`} />
              <div className="flex-1 min-w-0">
                <p className="text-xs font-bold text-gray-800 truncate">{o.magazin}</p>
                <p className="text-[10px] text-gray-400">{o.d60} D60 · {o.kg.toLocaleString("ro-RO")} kg</p>
              </div>
              <button onClick={() => onRemove(o.id)}
                className="w-5 h-5 rounded flex items-center justify-center text-gray-300 hover:text-red-500 hover:bg-red-50 transition-colors text-lg leading-none">
                ×
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [orders, setOrders] = React.useState(
    INITIAL_ORDERS.map(o => ({ ...o, activ: true }))
  );

  const toggleOrderActiv = (id) =>
    setOrders(p => p.map(o => o.id === id ? { ...o, activ: !o.activ } : o));
  const [assignments, setAssignments] = React.useState({});
  const [showSave, setShowSave] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [filterPrio, setFilterPrio] = React.useState(0);
  const [nrSoferi, setNrSoferi]     = React.useState(DEFAULT_DRIVERS);
  const [oraStart, setOraStart]     = React.useState("06:00");
  const [generating, setGenerating] = React.useState(false);

  // Vehiculele active = primele nrSoferi din flotă (ordonate după prioritate)
  const vehicles = FLEET.slice(0, nrSoferi);

  const handleGenerate = () => {
    setGenerating(true);
    // TODO: algoritmul VRP va fi implementat în page-rute.html
    // Momentan simulăm o procesare de 1.5s
    setTimeout(() => {
      setGenerating(false);
      // Redirect spre page-rute.html (va fi implementat)
      alert("✅ Rute generate! Pagina Rute va afișa rezultatul (în construcție).");
    }, 1500);
  };

  const today = new Date().toLocaleDateString("ro-RO", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

  // Assignment helpers
  const getAssignedVehicle = (orderId) => {
    for (const [vid, oids] of Object.entries(assignments)) {
      if (oids.includes(orderId)) return Number(vid);
    }
    return null;
  };

  const assignOrder = (orderId, vehicleId) => {
    setAssignments(prev => {
      const cleaned = {};
      for (const [vid, oids] of Object.entries(prev)) {
        const filtered = oids.filter(id => id !== orderId);
        if (filtered.length > 0) cleaned[vid] = filtered;
      }
      if (!vehicleId) return cleaned;
      return { ...cleaned, [vehicleId]: [...(cleaned[vehicleId] || []), orderId] };
    });
  };

  const removeFromVehicle = (orderId) => assignOrder(orderId, null);

  const getVehicleOrders = (vehicleId) => {
    const ids = assignments[vehicleId] || [];
    return orders.filter(o => ids.includes(o.id));
  };

  const activeOrders = orders.filter(o => o.activ);
  const assignedCount = activeOrders.filter(o => getAssignedVehicle(o.id) !== null).length;
  const unassignedCount = activeOrders.length - assignedCount;
  const usedVehicles = Object.values(assignments).filter(ids => ids.length > 0).length;

  const handleSaveConfirm = () => {
    setShowSave(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const filteredOrders = (filterPrio === 0 ? orders : orders.filter(o => o.prioritate === filterPrio))
    .slice().sort((a, b) => a.prioritate - b.prioritate);

  return (
    <div className="flex flex-col h-screen bg-gray-100 overflow-hidden">
      <Topbar />
      {showSave && <SaveModal assignedCount={assignedCount} totalCount={orders.length} onConfirm={handleSaveConfirm} onCancel={() => setShowSave(false)} />}

      <div className="flex flex-1 overflow-hidden">
        <Sidebar />

        <main className="flex-1 overflow-y-auto p-6 bg-gray-100">

          {/* Day Setup */}
          <DaySetup
            nrSoferi={nrSoferi} onNrSoferi={setNrSoferi}
            oraStart={oraStart} onOraStart={setOraStart}
            onGenerate={handleGenerate} generating={generating}
          />

          {/* Header card */}
          <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6">
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="text-[10px] font-extrabold text-teal-600 uppercase tracking-widest mb-1">BOARD PLANIFICARE</p>
                <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">Asignare comenzi</h1>
                <p className="text-sm text-gray-400 mt-1 capitalize">{today} · HUB PLOIEȘTI</p>
              </div>
              <div className="flex gap-3">
                <button className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-xs font-bold hover:bg-gray-200 transition-colors">
                  📥 Import comenzi
                </button>
                <button onClick={() => setShowSave(true)}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-teal-600 text-white text-xs font-bold hover:bg-teal-700 transition-colors shadow-sm">
                  💾 Salvează planificarea
                </button>
              </div>
            </div>

            {saved && (
              <div className="mb-4 flex items-center gap-2 px-4 py-3 bg-emerald-50 border border-emerald-200 rounded-xl text-sm font-bold text-emerald-700">
                ✓ Planificarea a fost salvată cu succes!
              </div>
            )}

            <div className="flex gap-4 flex-wrap">
              <StatsCard label="Magazine active"   value={activeOrders.length} color="teal"   />
              <StatsCard label="Asignate"          value={assignedCount}       color="green"  />
              <StatsCard label="Neasignate"        value={unassignedCount}     color={unassignedCount > 0 ? "red" : "green"} />
              <StatsCard label="Vehicule folosite" value={usedVehicles}        color="yellow" />
            </div>
          </div>

          {/* Content grid */}
          <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">

            {/* Orders panel — col 1-3 */}
            <div className="xl:col-span-3">
              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                {/* Panel header */}
                <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <div className="w-1 h-5 bg-teal-500 rounded-full" />
                    <h2 className="text-xs font-extrabold text-gray-600 uppercase tracking-widest">Comenzi de planificat</h2>
                  </div>
                  {/* Priority filter */}
                  <div className="flex gap-1.5">
                    {[0,1,2,3,4,5].map(p => (
                      <button key={p} onClick={() => setFilterPrio(p)}
                        className={`text-[10px] font-bold px-2.5 py-1.5 rounded-lg border transition-all
                          ${filterPrio === p
                            ? "bg-gray-900 text-white border-gray-900"
                            : "bg-gray-50 text-gray-500 border-gray-200 hover:border-gray-400"}`}>
                        {p === 0 ? "TOATE" : PRIO_CONFIG[p].label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Orders table */}
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-gray-100">
                        <th className="text-center text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-3 py-3">Activ</th>
                        <th className="text-left text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-5 py-3">Magazin</th>
                        <th className="text-center text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-3 py-3">Pal</th>
                        <th className="text-center text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-3 py-3">D60</th>
                        <th className="text-right text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-3 py-3">KG</th>
                        <th className="text-right text-[9px] font-extrabold text-gray-400 uppercase tracking-widest px-5 py-3 min-w-[180px]">Vehicul</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {filteredOrders.map(order => {
                        const assignedVid = getAssignedVehicle(order.id);
                        return (
                          <tr key={order.id} className={`transition-colors
                            ${!order.activ ? "opacity-40" : assignedVid ? "bg-emerald-50/30" : "hover:bg-gray-50/50"}`}>
                            <td className="px-3 py-3 text-center">
                              <button
                                onClick={() => toggleOrderActiv(order.id)}
                                className={`text-[10px] font-extrabold px-3 py-1.5 rounded-lg border tracking-widest transition-all
                                  ${order.activ
                                    ? "bg-teal-100 text-teal-700 border-teal-300 hover:bg-teal-200"
                                    : "bg-gray-100 text-gray-400 border-gray-200 hover:bg-gray-200"}`}>
                                {order.activ ? "DA" : "NU"}
                              </button>
                            </td>
                            <td className="px-5 py-3">
                              <div className="flex items-center gap-2.5">
                                <PriorityBadge priority={order.prioritate} />
                                <div>
                                  <p className="text-sm font-bold text-gray-800">{order.magazin}</p>
                                  <p className="text-[10px] text-gray-400">{order.cod}</p>
                                </div>
                              </div>
                            </td>
                            <td className="px-3 py-3 text-center">
                              <span className="text-sm font-bold text-gray-700">{order.paleti}</span>
                            </td>
                            <td className="px-3 py-3 text-center">
                              <span className="text-sm font-bold text-teal-600">{order.d60}</span>
                            </td>
                            <td className="px-3 py-3 text-right">
                              <span className="text-xs font-semibold text-gray-500">{order.kg.toLocaleString("ro-RO")}</span>
                            </td>
                            <td className="px-5 py-3 text-right">
                              <select
                                value={assignedVid || ""}
                                onChange={e => assignOrder(order.id, e.target.value ? Number(e.target.value) : null)}
                                className={`text-xs rounded-lg px-2 py-1.5 border focus:outline-none focus:ring-2 focus:ring-teal-400 transition-all cursor-pointer
                                  ${assignedVid
                                    ? "bg-emerald-50 border-emerald-200 text-emerald-700 font-bold"
                                    : "bg-gray-50 border-gray-200 text-gray-500"}`}>
                                <option value="">— Alege vehicul —</option>
                                {vehicles.map(v => (
                                  <option key={v.id} value={v.id}>{v.numar} · {v.denumire}</option>
                                ))}
                              </select>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* Vehicles panel — col 4-5 */}
            <div className="xl:col-span-2">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-5 bg-teal-500 rounded-full" />
                <h2 className="text-xs font-extrabold text-gray-600 uppercase tracking-widest">Vehicule disponibile</h2>
                <span className="ml-auto text-xs text-gray-400">{vehicles.length} vehicule</span>
              </div>
              <div className="flex flex-col gap-4">
                {vehicles.map(v => (
                  <VehicleLoadCard
                    key={v.id}
                    vehicle={v}
                    vOrders={getVehicleOrders(v.id)}
                    onRemove={removeFromVehicle}
                  />
                ))}
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
