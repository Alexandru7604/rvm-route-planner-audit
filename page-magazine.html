// ============================================================
// HELPER — transformă "7,6,5,4,3,2,1" → "7 > 6 > 5 > 4 > 3 > 2 > 1"
// ============================================================
function formatPrioritateAuto(val) {
  const trimmed = val.trim();
  if (!trimmed) return "";
  // dacă conține virgule → transformă
  if (trimmed.includes(",")) {
    return trimmed
      .split(",")
      .map(s => s.trim())
      .filter(Boolean)
      .join(" > ");
  }
  return trimmed;
}

// ============================================================
// MAP MINI
// ============================================================
function MapMini({ stores, storeCoords, onDoubleClick }) {
  const containerRef = React.useRef(null);
  const mapRef       = React.useRef(null);
  const markersRef   = React.useRef({});

  React.useEffect(() => {
    if (!containerRef.current || !window.L || mapRef.current) return;
    const L = window.L;
    const map = L.map(containerRef.current, {
      center: [DEPOT_COORDS.lat, DEPOT_COORDS.lng],
      zoom: 10,
      zoomControl: false, dragging: false,
      scrollWheelZoom: false, doubleClickZoom: false,
      keyboard: false, boxZoom: false,
    });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
    L.marker([DEPOT_COORDS.lat, DEPOT_COORDS.lng], {
      icon: L.divIcon({
        html: `<div style="background:#EA580C;color:white;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4)">🏭</div>`,
        className:'', iconSize:[28,28], iconAnchor:[14,14],
      }), zIndexOffset: 1000,
    }).addTo(map);
    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; markersRef.current = {}; };
  }, []);

  React.useEffect(() => {
    if (!mapRef.current || !window.L) return;
    const L = window.L; const map = mapRef.current;
    Object.values(markersRef.current).forEach(m => map.removeLayer(m));
    markersRef.current = {};
    stores.forEach((s, i) => {
      const c = storeCoords[s.id]; if (!c) return;
      const icon = L.divIcon({
        html: `<div style="background:#0D9488;color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)">${i+1}</div>`,
        className:'', iconSize:[20,20], iconAnchor:[10,10],
      });
      markersRef.current[s.id] = L.marker([c.lat, c.lng], { icon }).addTo(map);
    });
  }, [storeCoords, stores]);

  return (
    <div className="relative mt-5 rounded-2xl overflow-hidden border border-gray-200 cursor-pointer"
         style={{ height:'220px' }} onDoubleClick={onDoubleClick}>
      <div ref={containerRef} style={{ width:'100%', height:'100%' }} />
      <div className="absolute bottom-3 right-3 pointer-events-none">
        <div style={{ background:'rgba(0,0,0,.55)', color:'white', fontSize:'10px', fontWeight:'600',
                      padding:'4px 10px', borderRadius:'20px', backdropFilter:'blur(4px)' }}>
          ↕ Dublu-click pentru hartă completă
        </div>
      </div>
    </div>
  );
}

// MAP FULLSCREEN
// ============================================================
function MapFullscreen({ stores, storeCoords, onUpdateCoords, onCalcDistances, onClose, geocodingProgress, onGeocode, calculatingDist }) {
  const containerRef  = React.useRef(null);
  const mapRef        = React.useRef(null);
  const markersRef    = React.useRef({});
  const polylinesRef  = React.useRef({});
  const didFitRef     = React.useRef(false);

  React.useEffect(() => {
    if (!containerRef.current || !window.L) return;
    const L = window.L;
    const map = L.map(containerRef.current, {
      center: [DEPOT_COORDS.lat, DEPOT_COORDS.lng], zoom: 10,
    });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
    L.marker([DEPOT_COORDS.lat, DEPOT_COORDS.lng], {
      icon: L.divIcon({
        html: `<div style="background:#EA580C;color:white;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;border:2.5px solid white;box-shadow:0 3px 10px rgba(0,0,0,.4)">🏭</div>`,
        className:'', iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-20],
      }), zIndexOffset: 1000,
    }).addTo(map)
      .bindPopup('<div style="font-family:Inter,sans-serif;font-weight:800;font-size:13px">🏭 RAVMANN Depozit</div><div style="font-size:11px;color:#666;margin-top:2px">Str. Mihai Bravu 250F, Ploiești</div>');
    mapRef.current = map;
    setTimeout(() => {
      map.invalidateSize();
      // fit bounds o singură dată după ce harta e inițializată
      const allCoords = [[DEPOT_COORDS.lat, DEPOT_COORDS.lng]];
      Object.values(storeCoords).forEach(c => allCoords.push([c.lat, c.lng]));
      if (allCoords.length > 1) { map.fitBounds(allCoords, { padding:[50,50] }); }
      didFitRef.current = true;
    }, 300);
    return () => { map.remove(); mapRef.current = null; didFitRef.current = false; };
  }, []);

  React.useEffect(() => {
    if (!mapRef.current || !window.L) return;
    const L = window.L; const map = mapRef.current;
    Object.values(markersRef.current).forEach(m => map.removeLayer(m));
    Object.values(polylinesRef.current).forEach(p => map.removeLayer(p));
    markersRef.current = {}; polylinesRef.current = {};
    stores.forEach((s, i) => {
      const c = storeCoords[s.id]; if (!c) return;
      polylinesRef.current[s.id] = L.polyline(
        [[DEPOT_COORDS.lat, DEPOT_COORDS.lng], [c.lat, c.lng]],
        { color:'#0D9488', weight:1.5, opacity:.5, dashArray:'6,10' }
      ).addTo(map);
      const icon = L.divIcon({
        html: `<div style="background:#0D9488;color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35)">${i+1}</div>`,
        className:'', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-18],
      });
      const marker = L.marker([c.lat, c.lng], { icon, draggable:true }).addTo(map);
      marker.bindPopup(`<div style="font-family:Inter,sans-serif"><b style="font-size:12px">${s.denumire}</b><br><span style="font-size:11px;color:#666">${s.adresa}</span><br><b style="color:#0D9488;font-size:12px">${s.distanta_km} km</b> de la depozit</div>`);
      marker.on('dragend', (e) => {
        const p = e.target.getLatLng();
        onUpdateCoords(s.id, { lat: p.lat, lng: p.lng });
      });
      markersRef.current[s.id] = marker;
    });
  }, [storeCoords, stores]);

  const geocodedCount = stores.filter(s => storeCoords[s.id]).length;

  return (
    <div className="fixed inset-0 flex" style={{ zIndex:9999, background:'rgba(0,0,0,.75)' }}>
      {/* Panel stânga */}
      <div className="w-80 bg-white flex flex-col flex-shrink-0 overflow-hidden shadow-2xl">
        <div className="px-5 py-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
          <div>
            <p className="text-[10px] font-extrabold text-teal-600 uppercase tracking-widest">Hartă interactivă</p>
            <h2 className="text-base font-extrabold text-gray-900">Rute magazine</h2>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-lg bg-gray-200 hover:bg-gray-300 flex items-center justify-center text-gray-600 font-bold text-xl leading-none">×</button>
        </div>

        <div className="px-4 py-4 border-b border-gray-100 flex flex-col gap-2.5">
          <button onClick={onGeocode} disabled={geocodingProgress.active}
            className={`w-full py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all
              ${geocodingProgress.active ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-teal-600 text-white hover:bg-teal-700'}`}>
            {geocodingProgress.active
              ? `⏳ Geocodare ${geocodingProgress.current}/${geocodingProgress.total}...`
              : `📍 Geocodare automată (${geocodedCount}/${stores.length})`}
          </button>
          {geocodingProgress.active && (
            <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full bg-teal-500 rounded-full transition-all"
                   style={{ width:`${(geocodingProgress.current/geocodingProgress.total)*100}%` }} />
            </div>
          )}
          <button onClick={onCalcDistances} disabled={calculatingDist || geocodedCount === 0}
            className={`w-full py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all
              ${calculatingDist || geocodedCount === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
            {calculatingDist ? '⏳ Calculez distanțe...' : '📏 Calculează distanțe rutiere'}
          </button>
          <div className="flex items-center gap-4 pt-1">
            {[['#EA580C','🏭','Depozit'],['#0D9488','1','Magazin']].map(([bg,lbl,txt]) => (
              <div key={txt} className="flex items-center gap-1.5 text-[10px] font-semibold text-gray-500">
                <div style={{ background:bg, color:'white', borderRadius: lbl==='🏭'?'6px':'50%', width:16, height:16, display:'flex', alignItems:'center', justifyContent:'center', fontSize:lbl==='🏭'?10:8, fontWeight:800 }}>{lbl}</div>
                {txt}
              </div>
            ))}
            <div className="flex items-center gap-1.5 text-[10px] font-semibold text-gray-500">
              <div style={{ width:20, height:2, background:'#0D9488', opacity:.6, borderTop:'1.5px dashed #0D9488' }} />

        </div>

          {stores.map((s, i) => {
            const c = storeCoords[s.id];
            return (
              <div key={s.id}
                className="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors"
                onClick={() => {
                  if (c && mapRef.current) {
                    mapRef.current.setView([c.lat, c.lng], 15, { animate:true });
                    markersRef.current[s.id]?.openPopup();

                <div className="w-6 h-6 rounded-full bg-teal-600 flex items-center justify-center text-white font-extrabold text-[9px] flex-shrink-0">{i+1}</div>

      {/* Harta */}

    </div>
  );
}

function StoreForm({ onAdd, nextId }) {
  const [form, setForm] = React.useState(EMPTY_FORM);
  const [error, setError] = React.useState("");

  const f = (key) => (e) => setForm(p => ({ ...p, [key]: e.target.value }));
  const chk = (key) => (e) => setForm(p => ({ ...p, [key]: e.target.checked }));

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.denumire.trim()) { setError("Denumirea magazinului este obligatorie."); return; }
    setError("");
    onAdd({
      id: nextId,
      cod: form.cod.trim() || String(nextId).padStart(6, "0"),
      denumire: form.denumire.trim().toUpperCase(),
      localitate: form.localitate.trim(),
      adresa: form.adresa.trim(),
      distanta_km: parseFloat(form.distanta_km) || 0,
      prioritate_livrare: parseInt(form.prioritate_livrare) || 3,
      prioritate_auto: form.prioritate_auto.trim(),
      accepta_ep: form.accepta_ep,
      accepta_d60: form.accepta_d60,
      accepta_rolls: form.accepta_rolls,
      activ_in_planificare: true,
    });
    setForm(EMPTY_FORM);
  };

  return (
    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6">
      <div className="flex items-center gap-2 mb-6">
        <div className="w-1 h-5 bg-teal-500 rounded-full" />

      </div>

      <form onSubmit={handleSubmit}>
        {/* Row 1 */}
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-4">
          <Field label="Cod magazin"    value={form.cod}       onChange={f("cod")}       placeholder="ex: 000128" />
          <Field label="Denumire magazin *" value={form.denumire}  onChange={f("denumire")}  placeholder="ex: S PLOIEȘTI 4" />
          <Field label="Localitate"     value={form.localitate} onChange={f("localitate")} placeholder="ex: Ploiești" />
          <Field label="Adresă magazin" value={form.adresa}    onChange={f("adresa")}    placeholder="ex: Str. Mihai Bravu" />
        </div>

        {/* Row 2 */}
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <Field label="Distanță HUB – magazin (km)" type="number" value={form.distanta_km}       onChange={f("distanta_km")}       placeholder="ex: 5"   min="0" />
          <Field label="Prioritate livrare (1-5)"     type="number" value={form.prioritate_livrare} onChange={f("prioritate_livrare")} placeholder="ex: 3"   min="1" max="5" />
          <Field label="Prioritate auto (ordine)"
            value={form.prioritate_auto}
            onChange={f("prioritate_auto")}
            onBlur={() => setForm(p => ({ ...p, prioritate_auto: formatPrioritateAuto(p.prioritate_auto) }))}
            placeholder='ex: 7,6,5,4,3 sau 7 > 6 > 5'
            mono />
        </div>

        {/* Row 3 — Checkboxes */}
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
          <CheckboxBadge label="EP (450)"   subtitle="Euro Palet 450 kg"      checked={form.accepta_ep}    onChange={chk("accepta_ep")}    />
          <CheckboxBadge label="D60 (225)"  subtitle="Palet Dusseldorf 225 kg" checked={form.accepta_d60}   onChange={chk("accepta_d60")}   />

// APP
// ============================================================
function App() {
  const [stores, setStores]         = React.useState(INITIAL_STORES);
  const [nextId, setNextId]         = React.useState(12);
  const [editTarget, setEditTarget] = React.useState(null);
  const [delTarget, setDelTarget]   = React.useState(null);
  const [storeCoords, setStoreCoords]   = React.useState(INITIAL_STORE_COORDS);
  const [mapOpen, setMapOpen]           = React.useState(false);
  const [geocodingProgress, setGeocodingProgress] = React.useState({ active:false, current:0, total:0 });
  const [calculatingDist, setCalculatingDist]     = React.useState(false);

  // Sincronizare automată cu pagina Rute
  React.useEffect(() => {
    localStorage.setItem('rvm_stores', JSON.stringify(stores));
  }, [stores]);

  const addStore = (store) => { setStores(p => [...p, store]); setNextId(n => n + 1); };
  const saveEdit = (updated) => { setStores(p => p.map(s => s.id === updated.id ? updated : s)); setEditTarget(null); };
  const confirmDel = () => { setStores(p => p.filter(s => s.id !== delTarget.id)); setDelTarget(null); };

  const updateCoords = async (storeId, coords) => {
    setStoreCoords(prev => ({ ...prev, [storeId]: coords }));
    try {
      const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${DEPOT_COORDS.lng},${DEPOT_COORDS.lat};${coords.lng},${coords.lat}?overview=false`);
      const d = await r.json();
      if (d.routes?.[0]) {
        const km = Math.round(d.routes[0].distance / 1000);
        setStores(prev => prev.map(s => s.id === storeId ? { ...s, distanta_km: km } : s));
      }
    } catch {}
  };

  const geocodeAll = async () => {
    setGeocodingProgress({ active:true, current:0, total:stores.length });
    for (let i = 0; i < stores.length; i++) {
      const s = stores[i];
      setGeocodingProgress({ active:true, current:i+1, total:stores.length });
      const q = encodeURIComponent(`${s.adresa}, ${s.localitate}, Romania`);
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`);
        const d = await r.json();
        if (d.length > 0) setStoreCoords(prev => ({ ...prev, [s.id]: { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } }));
      } catch {}
      await new Promise(r => setTimeout(r, 1100));
    }
    setGeocodingProgress({ active:false, current:0, total:0 });
  };

  const calcAllDistances = async () => {
    setCalculatingDist(true);
    const updates = {};
    for (const s of stores) {
      const c = storeCoords[s.id]; if (!c) continue;
      try {
        const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${DEPOT_COORDS.lng},${DEPOT_COORDS.lat};${c.lng},${c.lat}?overview=false`);
        const d = await r.json();
        if (d.routes?.[0]) updates[s.id] = Math.round(d.routes[0].distance / 1000);
      } catch {}
    }
    if (Object.keys(updates).length > 0)
      setStores(prev => prev.map(s => updates[s.id] != null ? { ...s, distanta_km: updates[s.id] } : s));
    setCalculatingDist(false);
  };

  return (
    <div className="flex flex-col h-screen bg-gray-100 overflow-hidden">
      <Topbar />

      {editTarget && <EditStoreModal store={editTarget} onSave={saveEdit} onCancel={() => setEditTarget(null)} />}
      {delTarget  && <ConfirmModal denumire={delTarget.denumire} onConfirm={confirmDel} onCancel={() => setDelTarget(null)} />}
      {mapOpen && (
        <MapFullscreen
          stores={stores}
          storeCoords={storeCoords}
          onUpdateCoords={updateCoords}
          onCalcDistances={calcAllDistances}
          onClose={() => setMapOpen(false)}
          geocodingProgress={geocodingProgress}
          onGeocode={geocodeAll}
          calculatingDist={calculatingDist}
        />
      )}

      <div className="flex flex-1 overflow-hidden">
        <Sidebar />

        <main className="flex-1 overflow-y-auto p-6 bg-gray-100">

          {/* ── Header card ── */}
          <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6">
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="text-[10px] font-extrabold text-teal-600 uppercase tracking-widest mb-1">Date operaționale</p>
                <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">Magazine</h1>
                <p className="text-sm text-gray-400 mt-1">Gestionează magazinele și alocarea prioritară a vehiculelor pe fiecare magazin.</p>
              </div>
              <button className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-gray-900 text-white text-xs font-bold hover:bg-gray-800 transition-colors shadow-sm flex-shrink-0 ml-4">
                📥 Importă magazine CSV/XLSX
              </button>
            </div>

            <div className="flex gap-4 flex-wrap">
              <StatBox icon="🏪" label="Total magazine" value={stores.length} />
              <StatBox icon="🚚" label="Expedieri directe" value="Din HUB către magazine" />
            </div>
            <MapMini
              stores={stores}
              storeCoords={storeCoords}
              onDoubleClick={() => setMapOpen(true)}
            />
          </div>

          {/* ── Add form ── */}
          <StoreForm onAdd={addStore} nextId={nextId} />

          {/* ── Stores grid ── */}
          <div>
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <div className="w-1 h-5 bg-teal-500 rounded-full" />
                <h2 className="text-xs font-extrabold text-gray-600 uppercase tracking-widest">Magazine existente</h2>
              </div>
              <span className="text-xs text-gray-400 font-medium">{stores.length} magazine</span>
            </div>

            {stores.length === 0 ? (
              <div className="bg-white rounded-2xl border-2 border-dashed border-gray-200 p-20 text-center">
                <p className="text-5xl mb-4">🏪</p>
                <p className="font-extrabold text-gray-700 text-lg">Nu există magazine</p>
                <p className="text-sm text-gray-400 mt-2">Adaugă manual sau importă CSV/XLSX</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                {stores.map(s => (
                  <StoreCard
                    key={s.id}
                    store={s}
                    onEdit={setEditTarget}
                    onDelete={(id) => setDelTarget(stores.find(x => x.id === id))}
                  />
                ))}
              </div>
            )}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
